<!DOCTYPE html>
<html>
<head><title>Blog</title></head>
<body>
  <h1>Posty</h1>
  {% for post in posts %}
    <article>
      <h2><a href="{% url 'post-detail' post.pk %}">{{ post.title }}</a></h2>
      <p>{{ post.author }} — {{ post.published_at|date:"d.m.Y" }}</p>
    </article>
  {% empty %}
    <p>Brak postów.</p>
  {% endfor %}
</body>
</html>
